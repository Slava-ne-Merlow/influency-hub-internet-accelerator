name: Deploy App Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/app-backend/**"
      - "services/app-frontend/**"
      - "infra/app-server/**"
      - ".github/workflows/deploy-app.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.APP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.APP_HOST }} >> ~/.ssh/known_hosts

      - name: Upload repo to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ \
            ${{ secrets.APP_USER }}@${{ secrets.APP_HOST }}:/opt/influency/repo/

      - name: Run deploy script
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.APP_USER }}@${{ secrets.APP_HOST }} '
            mkdir -p /opt/influency/repo &&
            cd /opt/influency/repo &&
            bash infra/app-server/deploy.sh
          '