version: "3.8"

services:
  vpn-admin-api:
    build:
      context: /opt/influency/vpn-admin-api
    container_name: vpn-admin-api
    network_mode: host
    restart: unless-stopped
    environment:
      - XRAY_API_SERVER=127.0.0.1:10085
      - XRAY_INBOUND_TAG=vless-reality
      - XRAY_INBOUND_PORT=443
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "18080"]