spring:
  application:
    name: StaffAccessVPNBackend
  devtools:
    restart:
      enabled: false
  docker:
    compose:
      file: dev-compose.yml
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml

  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    url: ${POSTGRES_JDBC_URL}

  jpa:
    hibernate:
      ddl-auto: none


  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 16MB

jwt:
  secret: ${JWT_SECRET:changeme-dev-secret-minimum-32-characters-required-for-hmac-sha256-algorithm}
  access-token-expiration: 604800000

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health, prometheus

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /docs/v3
  swagger-ui:
    path: /docs/

server:
  port: ${SERVER_PORT:8080}

sentry:
  dsn: ${SENTRY_DSN:}

logging:
  level:
    root: INFO
    de.vyacheslav.kushchenko.staff.vpn: DEBUG


app:
  owner:
    tgids: ${OWNER_TG_IDs}
  admin:
    tgids: ${ADMIN_TG_IDs:}
    webapp-url: https://oexfce-109-252-169-61.ru.tuna.am/
  support:
    url: ${SUPPORT_URL:}
  vpn:
    instruction-url: https://telegra.ph/Ustanovka-VPN-rukovodstvo-11-10
    admin:
      base-url: ${VPN_ADMIN_API_BASE_URL:http://127.0.0.1:18080}
      service-key: ${VPN_ADMIN_API_SERVICE_KEY}
      connect-timeout: ${VPN_ADMIN_API_CONNECT_TIMEOUT:5s}
      read-timeout: ${VPN_ADMIN_API_READ_TIMEOUT:10s}

ktgram:
  auto-start-polling: true
  bot:
    - token: ${TELEGRAM_BOT_TOKEN:${TELEGRAM_TOKEN}}
      pckg: de.vyacheslav.kushchenko.staff.vpn.telegram
      identifier: ${TELEGRAM_USERNAME:KtGram}


