databaseChangeLog:
  - changeSet:
      id: 5-add-vpn-bot-access-model
      author: Codex
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: manual_access_type
                  type: VARCHAR(50)
                  defaultValue: NONE
                  constraints:
                    nullable: false
              - column:
                  name: manual_access_until
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
        - addColumn:
            tableName: access_requests
            columns:
              - column:
                  name: decision_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: true
        - addColumn:
            tableName: trusted_chats
            columns:
              - column:
                  name: initiated_by
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: initiated_by_role
                  type: VARCHAR(50)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: trusted_chats
            baseColumnNames: initiated_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_trusted_chats_initiated_by
            deferrable: false
            initiallyDeferred: false
            onDelete: SET NULL
        - sql:
            sql: |
              UPDATE trusted_chats
              SET status = CASE
                WHEN status = 'ACTIVE' THEN 'APPROVED'
                WHEN status = 'BLOCKED' THEN 'REJECTED'
                ELSE status
              END
