databaseChangeLog:
  - changeSet:
      id: 4-add-user-profile-fields
      author: Mstislav_the
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: avatar_url
                  type: VARCHAR(1024)
                  constraints:
                    nullable: true
